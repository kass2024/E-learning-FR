<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Xander Global Scholars office locations">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3d7a"/>
      <stop offset="100%" stop-color="#012F6B"/>
    </linearGradient>
    <linearGradient id="land" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001a3d" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="280" fill="url(#ocean)"/>
  <path d="M0 180 Q180 120 360 150 T720 130 T1200 160 L1200 280 L0 280 Z" fill="url(#land)" opacity="0.95"/>
  <path d="M80 200 Q220 150 380 170 Q520 185 640 160 Q820 130 980 175 L1200 190 L1200 280 L0 280 Z" fill="#93c5fd" opacity="0.45"/>
  <circle cx="220" cy="148" r="52" fill="#F2A65A" opacity="0.18"/>
  <circle cx="860" cy="132" r="48" fill="#F2A65A" opacity="0.18"/>
  <!-- San Francisco -->
  <g filter="url(#shadow)" transform="translate(210,118)">
    <path d="M0 0 L14 38 L0 32 L-14 38 Z" fill="#F2A65A" stroke="#012F6B" stroke-width="2"/>
    <circle cy="10" r="6" fill="#fff"/>
  </g>
  <text x="210" y="178" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="700">San Francisco, USA</text>
  <!-- Muhanga -->
  <g filter="url(#shadow)" transform="translate(850,102)">
    <path d="M0 0 L14 38 L0 32 L-14 38 Z" fill="#F2A65A" stroke="#012F6B" stroke-width="2"/>
    <circle cy="10" r="6" fill="#fff"/>
  </g>
  <text x="850" y="162" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="700">Muhanga, Rwanda</text>
  <text x="600" y="42" text-anchor="middle" fill="#ffffff" opacity="0.85" font-family="Arial,sans-serif" font-size="15" font-weight="600">Global offices · Xander Global Scholars</text>
</svg>
